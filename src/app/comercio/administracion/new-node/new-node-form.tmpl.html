<md-dialog aria-label="options dialog" class="popUp-domicilio" style="max-height: 500px; width: 1000px;">
    <md-dialog-content layout-padding>

        <h2 class="md-title " translate>DATOS_NODO</h2>
        <md-select ng-show="mostrarSeleccionMultiple" placeholder="Seleccione un modo de entrega" ng-model="entregaSelected" style="min-width: 30vw;">
            <md-option ng-value="delivery" ng-repeat="delivery in deliveryTypes" ng-click="setDeliveryType(delivery)">{{delivery.label}}</md-option>
        </md-select>

        <!---------------------------------------------->

        <div layout-gt-sm="row">
            <md-input-container class="md-block" flex-gt-sm>
                <label translate>ALIAS_NODO</label>
                <input ng-model="nodo.alias">
            </md-input-container>
            <md-input-container class="md-block" flex-gt-sm>
                <label translate>BARRIO</label>
                <input ng-model="nodo.barrio">
            </md-input-container>
        </div>
        <div layout-gt-sm="row">
            <md-input-container class="md-block" flex-gt-sm>
                <label translate>ALIAS_DOMICILIO</label>
                <input ng-model="nodo.aliasDomicilio">
            </md-input-container>
        </div>
        
        <md-input-container class="md-block">
            <label translate>DESCRIPCION_NODO</label>
            <textarea type="" name="" placeholder="Ingrese una descripcion del nodo. Por ejemplo: 'Siempre cierro los pedidos una semana antes'" style="width: 100%; margin: 0 auto; resize: none;" ng-model="nodo.descripcion" md-maxlength="150" rows="5" md-select-on-focus>
            </textarea>
        </md-input-container>

        <div layout-gt-sm="row">
            <!-----Calle nro piso------------------------------>
            <md-input-container class="md-block" flex-gt-sm>
                <label translate>Calle</label>
                <input ng-model="nodo.calle">
            </md-input-container>
            <md-input-container class="md-block" flex-gt-sm>
                <label translate>Numero</label>
                <input ng-model="nodo.numeroCalle">
            </md-input-container>
            <md-input-container class="md-block" flex-gt-sm>
                <label translate>Piso</label>
                <input ng-model="nodo.piso">
            </md-input-container>
        </div>

        <label class="md-block ng-scope" translate="ENTRE_CALLES_DIRECCION"></label>

        <div layout-gt-sm="row">
            <!-------Calle1 Calle2------>
            <md-input-container class="md-block" flex-gt-sm>
                <label translate>Calle 1</label>
                <input ng-model="nodo.calle1">
            </md-input-container>
            <md-input-container class="md-block" flex-gt-sm>
                <label translate>Calle 2</label>
                <input ng-model="nodo.calle2">
            </md-input-container>
        </div>

        <div layout-gt-sm="row">
            <!---Ciudad CodigoPostal-->
            <md-input-container class="md-block" flex-gt-sm>
                <label translate>Ciudad</label>
                <input ng-model="nodo.ciudad">
            </md-input-container>
            <md-input-container class="md-block" flex-gt-sm>
                <label translate>CodigoPostal</label>
                <input ng-model="nodo.codigoPostal">
            </md-input-container>
        </div>

        <!---------------------------------------------->

        <md-input-container class="md-block">
            <label translate>COMENTARIOS_DOMICILIO</label>
            <textarea type="" name="" placeholder="Ingrese alguna particularidad del domicilio. Por ejemplo: 'No funciona el timbre'" style="width: 100%; margin: 0 auto; resize: none;" ng-model="nodo.comentario" md-maxlength="150" rows="5" md-select-on-focus>
            </textarea>
        </md-input-container>

        <div layout-gt-sm="row" layout-align="space-between center">
            <div>
               Tipo de nodo: {{nodo.estado? "ABIERTO" : "CERRADO"}}
            </div>
                            

            <md-radio-group ng-model="nodo.visibilidad" ng-change="showNode()">
                <div layout-align="space-between center" layout="row">
                    <div layout-gt-sm="row">
                        <md-radio-button ng-value="true"> ABIERTO </md-radio-button>
                    </div>
                    <div layout-gt-sm="row">
                        <md-radio-button ng-value="false"> CERRADO </md-radio-button>
                    </div>
                </div>
            </md-radio-group>
        </div>


    </md-dialog-content>
    <md-dialog-actions>
        <span flex></span>
        <md-button class="confirma-domicilio" ng-click="cancelAction()">
            <label translate="CANCELAR"></label>
        </md-button>
        <md-button class="confirma-domicilio" ng-click="okAction()">
            <label translate="CONFIRMAR"></label>
        </md-button>
    </md-dialog-actions>
</md-dialog>
